name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: List dependency versions
        run: |
          echo "npm: $(npm --version)"
          echo "node: $(node --version)"
          npm ls || true

      - name: Run tests
        run: npm run test
